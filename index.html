<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- TODO: replace google-site-verification with your own once you verify glassnote.site in Google Search Console -->
  <title>Glassnote</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!--
    CSP connect-src whitelist:
      - api.glassnote.site         your hosted backend (auth, chat proxy, trial, webhook callbacks)
      - generativelanguage.googleapis.com  Gemini direct (BYO-key path)
      - api.groq.com               Groq direct (BYO-key path)
      - *.google-analytics.com / googletagmanager.com / analytics.google.com   GA4 (replace measurement ID — see TODO.md P1)
    Upstream's campaign-sand.vercel.app intentionally removed.
  -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; img-src 'self' data: https:; connect-src 'self' https://api.glassnote.site wss://api.glassnote.site https://generativelanguage.googleapis.com https://api.groq.com https://*.google-analytics.com https://analytics.google.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
</head>

<body style="background-color: transparent; margin: 0; overflow: hidden;">
  <!-- Synchronously apply cached theme before any render — prevents flash/mixed theme -->
  <script>
    try {
      var t = localStorage.getItem('glassnote_resolved_theme');
      if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
    } catch(e) {}
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
